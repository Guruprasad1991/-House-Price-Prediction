[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

[flake8]
max-line-length = 100
ignore = E203, W503
exclude = .venv, __pycache__, .git, build, dist

[coverage:run]
source = app, ml
omit = tests/*, .venv/*

[coverage:report]
show_missing = True
skip_covered = False
